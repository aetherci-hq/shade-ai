name: Specter
timezone: America/New_York
llm:
  provider: claude
  model: claude-sonnet-4-20250514
  maxTokens: 4096
models:
  default: claude-sonnet-4-20250514
  advanced: claude-opus-4-20250514
  heartbeat: haiku
agent:
  maxTurns: 100
  permissionMode: bypassPermissions
  subagents:
    researcher:
      description: Research agent for web searches, information gathering, and analysis.
      prompt: You are a research specialist. Search the web, gather information, and report findings concisely.
      tools:
        - WebSearch
        - WebFetch
        - Read
        - Grep
        - Glob
      model: haiku
    coder:
      description: Coding agent for writing, editing, and debugging code.
      prompt: You are a coding specialist. Write clean, correct code. Read existing code before modifying it.
      tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
      model: sonnet
heartbeat:
  enabled: true
  intervalMinutes: 30
  model: haiku
server:
  port: 3700
  host: 0.0.0.0
  authToken: d87ae55168104f1cbbd687bf
memory:
  dir: .
  stateDir: state
  embedModel: Xenova/all-MiniLM-L6-v2
  autoCapture: true
  maxEntries: 10000
  contextLimit: 8
tools:
  allowed:
    - Read
    - Write
    - Edit
    - Bash
    - Glob
    - Grep
    - WebFetch
    - WebSearch
    - Agent
  disallowed: []
  userDir: tools
voice:
  enabled: true
  provider: elevenlabs
  apiKey: ${ELEVENLABS_API_KEY}
  voiceId: OYRGNLISJdGGRcZArrNH
  model: eleven_turbo_v2_5
  triggers:
    - responses
  maxCharsPerHour: 5000
  maxCostPerDay: 1
guardrails:
  blockedCommands:
    - rm -rf /
    - format
    - shutdown
    - reboot
    - del /f /s /q
  blockedPaths:
    - /etc
    - /System
    - C:\Windows
    - C:\Program Files
  maxShellTimeout: 30000
  allowedHosts:
    - "*"
  maxFileSize: 1048576
